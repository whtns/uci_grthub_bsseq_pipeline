# Configuration file for RNA-seq Snakemake workflow

# Input/Output paths
paths:
  data: "/dfs9/ucightf-lab/kstachel/test_Data"  # Directory containing FASTQ files with pattern {sample}_R1_001.fastq.gz and {sample}_R2_001.fastq.gz
  trimmed: "output/trimmed_fastq"
  hisat2: "output/hisat2_alignment"
  alignment_summary: "output/hisat2_alignment/alignment_summary"
  feature_count: "output/feature_count"
  deseq2: "output/deseq2"
  salmon: "output/salmon_quant"

# Reference files
references:
  adapters: "/dfs9/ucightf-lab/kstachel/TOOLS/Trimmomatic-0.39/adapters/TruSeq3-PE-2.fa"
  hisat2_index: "/dfs8/commondata/hisat2/references/grch38_snp_tran/genome_snp_tran"
  gtf: "/dfs8/commondata/hisat2/references/grch38_snp_tran/Homo_sapiens.GRCh38.84.gtf"
  salmon_index: "/dfs9/ucightf-lab/projects/REFERENCES/human/Salmon/GRCh38_v33_salmon_index"

# Tool paths
tools:
  trimmomatic: "/dfs9/ucightf-lab/kstachel/TOOLS/Trimmomatic-0.39/trimmomatic-0.39.jar"

# Parameters
params:
  trimmomatic:
    illuminaclip: "2:30:10:8:true"
    sliding_window: "4:15"
    min_length: 20
  hisat2:
    rna_strandness: "RF"  # For TruSeq mRNA Stranded libraries
  salmon:
    library_type: "ISR"  # For TruSeq mRNA Stranded PE libraries
  feature_counts:
    strandness: 2  # For stranded libraries (first read reverse)
  cpus: 8

deseq2:
  metadata: "metadata.csv"

# iSEE App configuration
isee_app:
  condition: "dex"
  group_a: "ALS"    # First group for comparison
  group_b: "CTR"    # Second group for comparison
