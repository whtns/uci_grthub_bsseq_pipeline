# Configuration file for RNA-seq Snakemake workflow

# Input/Output paths
paths:
  data: "/dfs9/ucightf-lab/test_Data"  # Directory containing FASTQ files with pattern {sample}_R1_001.fastq.gz and {sample}_R2_001.fastq.gz
  trimmed: "results/trimmed_fastq"
  hisat2: "results/hisat2_alignment"
  alignment_summary: "results/hisat2_alignment/alignment_summary"
  feature_count: "results/feature_count"
  salmon: "results/salmon_quant"

# Reference files
references:
  adapters: "/dfs9/ucightf-lab/kstachel/TOOLS/Trimmomatic-0.39/adapters/TruSeq3-PE-2.fa"
  hisat2_index: "/dfs8/commondata/hisat2/grch38_snp_tran/genome_snp_tran"
  gtf: "/dfs8/commondata/hisat2/grch38_snp_tran/Homo_sapiens.GRCh38.84.gtf"
  salmon_index: "/pub/linc13/ref/human_ref/salmon/v1.1.0/GRCh38/GRCh38_v33_salmon_index"

# Tool paths
tools:
  trimmomatic: "/dfs9/ucightf-lab/kstachel/TOOLS/Trimmomatic-0.39/trimmomatic-0.39.jar"

# Parameters
params:
  trimmomatic:
    illuminaclip: "2:30:10:8:true"
    sliding_window: "4:15"
    min_length: 20
  hisat2:
    rna_strandness: "RF"  # For TruSeq mRNA Stranded libraries
  salmon:
    library_type: "ISR"  # For TruSeq mRNA Stranded PE libraries
  feature_counts:
    strandness: 2  # For stranded libraries (first read reverse)
  cpus: 8
