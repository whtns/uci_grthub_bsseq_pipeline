# Author: Jeffrey Grover
# Purpose: Config file to edit before running the WGBS workflow Snakefile
# Created: 2019-05-22

# Global variables used for multiple rules

samples:
    - Sample1
    - Sample2
    - etc...
    # Samples should be reported by ID rather than filenames, and exclude the
    # trailing "R1" and "R2", one sample ID per pair. If samples are supplied as
    # separate .fastq.gz files within each pair concatenate them to a single R1 and
    # R2 file prior to running.

reference_genome:
    /dfs9/ucightf-lab/projects/SmitQ/251103_1125Bio-13_SmitQ_BSseq/data/targeted_reference/targeted_reference.fa
    # Path to a reference genome here with .fasta extension
    # If indexed, then the index will not be regenerated


# Options for individual workflow steps
# Configure threads for each step as desired, this is a sane starting point

trim_galore:
    adapter_seq : AGATCGGAAGAGCACACGTCTGAACTCCAGTCAC
    quality : 20

bwameth:
    threads : 10
    
samtools_sort:
    threads : 5
    mem : 4G

samtools_index:
    threads : 5

methyldackel:
    threads : 5

mosdepth:
    threads : 5
    mapping_quality : 10


# Paths to individual tools
# You probably don't need to change this unless programs are not in your $PATH
# Picard sometimes needs an alias to java -jar /install_dir/picard.jar

paths:
  data: "data/FASTQ"  # Directory containing FASTQ files with pattern {sample}_R1_001.fastq.gz and {sample}_R2_001.fastq.gz
  trimmed: "output/trimmed_fastq"
  hisat2: "output/hisat2_alignment"
  alignment_summary: "output/hisat2_alignment/alignment_summary"
  feature_count: "output/feature_count"
  deseq2: "output/deseq2"
  salmon: "output/salmon_quant"

# Reference files
references:
  adapters: "/dfs9/ucightf-lab/kstachel/TOOLS/Trimmomatic-0.39/adapters/TruSeq3-PE-2.fa"
  hisat2_index: "/dfs8/commondata/hisat2/references/grch38_snp_tran/genome_snp_tran"
  gtf: "/dfs8/commondata/hisat2/references/grch38_snp_tran/Homo_sapiens.GRCh38.84.gtf"
  salmon_index: "/dfs9/ucightf-lab/projects/REFERENCES/human/Salmon/GRCh38_v33_salmon_index"

# Tool paths
tools:
  trimmomatic: "/dfs9/ucightf-lab/kstachel/TOOLS/Trimmomatic-0.39/trimmomatic-0.39.jar"
  fastqc_path : fastqc
  bwameth_path : /data/homezvol1/kstachel/.local/bin/bwameth.py
  bismark_path: bismark
  samtools_path : samtools
  methyldackel_path : ~/.conda/envs/bsseq/bin/MethylDackel
  mosdepth_path : ~/.conda/envs/bsseq/bin/mosdepth
  picard_path: /opt/apps/picard-tools/3.3.0/picard.jar

bismark_genome: /dfs9/ucightf-lab/projects/SmitQ/251103_1125Bio-13_SmitQ_BSseq/data/targeted_reference

# Parameters
params:
  trimmomatic:
    illuminaclip: "2:30:10:8:true"
    sliding_window: "4:15"
    min_length: 20
  hisat2:
    rna_strandness: "RF"  # For TruSeq mRNA Stranded libraries
  salmon:
    library_type: "ISR"  # For TruSeq mRNA Stranded PE libraries
  feature_counts:
    strandness: 2  # For stranded libraries (first read reverse)
  cpus: 8

deseq2:
  metadata: "metadata.csv"

# iSEE App configuration
isee_app:
  condition: "dex"
  group_a: "ALS"    # First group for comparison
  group_b: "CTR"    # Second group for comparison