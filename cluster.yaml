# Cluster configuration for SLURM
# This file defines SLURM-specific parameters for each rule

__default__:
  account: "SBSANDME_LAB"
  partition: "standard"
  nodes: 1
  ntasks: 1
  time: "02:00:00"
  mem: "4G"
  output: "slurm-%x.%j.out"
  error: "slurm-%x.%j.err"

trimmomatic:
  cpus-per-task: 4
  time: "04:00:00"
  mem: "8G"
  job-name: "trimmomatic"

hisat2_align:
  cpus-per-task: 4
  ntasks: 4
  mem-per-cpu: "6G"
  time: "06:00:00"
  job-name: "hisat2_align"

sort_bam:
  cpus-per-task: 4
  ntasks: 4
  mem-per-cpu: "6G"
  time: "02:00:00"
  job-name: "sort_bam"

feature_counts:
  cpus-per-task: 1
  ntasks: 4
  mem-per-cpu: "6G"
  time: "02:00:00"
  job-name: "feature_counts"

salmon_quant:
  cpus-per-task: 1
  ntasks: 4
  mem-per-cpu: "6G"
  time: "04:00:00"
  job-name: "salmon_quant"
